[build]
  command = "npm run build"
  publish = "dist"
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# ═══ CRITICAL: Cross-Origin Isolation for SharedArrayBuffer ═══
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "microphone=(self)"

# ═══ WASM files — correct MIME type + immutable cache ═══
[[headers]]
  for = "*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

# ═══ JS/CSS hashed assets — immutable cache ═══
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ═══ Main page — always revalidate ═══
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# ═══ IMPORTANT: Let Netlify functions pass through — must be BEFORE catch-all ═══
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# ═══ SPA routing (catch-all LAST) ═══
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
